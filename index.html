<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Dictate</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h3>Dictate</h3>
    <button onclick="location.reload()">Restart</button>
    <!-- Select Language -->
    <select id="selectLang">
      <option value="sv" selected>Svenska</option>
      <option value="en">English</option>
      <option value="zh-CN">Chinese</option>
    </select>
    <br><br>
    <!-- Input Word List -->
    <div id="input">
      <textarea id="inputWordList"
                rows="7" 
                cols="30" 
                placeholder="Input word list"></textarea>
      <button id="startDictating"
              onclick="startDictating()">Start</button>
    </div>
    <!-- Start Dictating! -->
    <div id="dictating">
      <audio controls id="tts-audio"></audio>
      <br><br>
      <input id="dictateWord"
             type="text"
             placeholder="Input what you heard"
             onkeydown="if(event.key==='Enter'){checkWord()}">
      <button id="checkWord"
              onclick="checkWord()">Check</button>
      <br>
      <div id="result">
        <p>Listen to the audio</p>
      </div>
    </div>
  </body>
</html>
