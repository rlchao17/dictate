<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Dictate</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body id="body">
    <h2>Dictate</h2>
    <!-- Restart -->
    <button onclick="location.reload()">Restart</button>
    <!-- Select Language -->
    <select id="selectLang">
      <option value="sv" selected>Svenska</option>
      <option value="en">English</option>
      <option value="zh-CN">简体中文</option>
    </select>
    <br><br>
    <!-- Input Word List -->
    <div id="init">
      <textarea id="wordListInput"
                placeholder="Input word list"></textarea>
      <br><br>
      <button onclick="startDictating()">Start</button>
    </div>
    <!-- Start Dictating! -->
    <div id="afterInit">
      <audio controls id="tts-audio"></audio>
      <br><br>
      <input id="dictateInput"
             type="text"
             placeholder="Input what you heard"
             onkeydown="if(event.key==='Enter'){checkWord()}">
      <button onclick="checkWord()">Check</button>
      <br>
      <!-- Result -->
      <div>
        <div id="correct">
          <p class="correctColor">Correct</p>
        </div>
        <div id="incorrect">
          <p class="incorrectColor">Incorrect:</p>
          <div id="showCorrect" class="correctColor"></div>
          <div id="showWrong" class="incorrectColor"></div>
        </div>
      </div>
    </div>
    <!-- Final Result -->
    <div id="finalResult">
      <table id="finalResultTable" border="1">
        <tr>
          <th>Original</th>
          <th>Dictated</th>
        </tr>
      </table>
    </div>
  </body>
</html>
